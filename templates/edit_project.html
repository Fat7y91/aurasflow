{% extends 'base.html' %}

{% block title %}تعديل المشروع - {{ super() }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-lg">
            <div class="card-header bg-white">
                <h3 class="text-center text-primary">
                    <i class="fa-solid fa-pen-to-square me-2"></i>
                    تعديل المشروع
                </h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">اسم المشروع *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ project.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="website" class="form-label">الموقع الإلكتروني</label>
                        <input type="url" class="form-control" id="website" name="website" value="{{ project.website or '' }}" placeholder="https://">
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">وصف المشروع</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ project.description or '' }}</textarea>
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fa-solid fa-floppy-disk me-2"></i>
                            حفظ التغييرات
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
