{% extends 'base.html' %}

{% block title %}الملف الشخصي - {{ super() }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-lg">
            <div class="card-header bg-white">
                <h3 class="text-center text-primary">
                    <i class="fa-solid fa-user-gear me-2"></i>
                    الملف الشخصي
                </h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">اسم المستخدم</label>
                        <input type="text" class="form-control" id="username" value="{{ user.username }}" disabled>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="credits" class="form-label">رصيد النقاط</label>
                        <input type="text" class="form-control" id="credits" value="{{ user.credits }} نقطة" disabled>
                    </div>
                    
                    <hr>
                    
                    <h5 class="mb-3">تغيير كلمة المرور</h5>
                    
                    <div class="mb-3">
                        <label for="new_password" class="form-label">كلمة المرور الجديدة</label>
                        <input type="password" class="form-control" id="new_password" name="new_password">
                        <div class="form-text">اترك الحقل فارغًا إذا كنت لا تريد تغيير كلمة المرور</div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk me-2"></i>
                            حفظ التغييرات
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
