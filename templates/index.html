<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>AiDesignFlow | صانع الأفكار الإبداعية</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
  <div class="container">
    <h1 class="title">🎨 AiDesignFlow</h1>

    <form id="designForm">
      <textarea name="prompt" placeholder="اكتب فكرة التصميم هنا..." required></textarea>

      <div class="options-row">
        <label>درجة الإبداع:</label>
        <select name="creativity">
          <option value="منخفض">منخفض</option>
          <option value="متوسط" selected>متوسط</option>
          <option value="مرتفع">مرتفع</option>
        </select>
      </div>

      <div class="options-row">
        <label>نمط التفكير:</label>
        <select name="mode">
          <option value="focused" selected>مركّز</option>
          <option value="creative">إبداعي</option>
        </select>
      </div>

      <div class="options-row">
        <label>النموذج:</label>
        <select name="model">
          <option value="DeepSeek" selected>DeepSeek</option>
          <option value="ChatGPT">ChatGPT</option>
        </select>
      </div>

      <div class="options-row">
        <label>لغة الواجهة:</label>
        <select name="ui_language">
          <option value="ar" selected>العربية</option>
          <option value="en">English</option>
        </select>
      </div>

      <button type="submit">🚀 إنشاء التصميم</button>
    </form>

    <div id="loading" class="loader" style="display:none;">
      <p id="loading-text">0%</p>
    </div>

    <div id="resultBox" style="display:none;">
      <h3>📋 النتيجة:</h3>
      <pre id="resultText"></pre>
      <button id="copyBtn">📋 نسخ</button>
    </div>

    <div id="toast" class="toast">✅ تم النسخ!</div>
  </div>

  <script>
    const progressPhrases = [
      "🧠 جاري تحليل الفكرة...",
      "💡 ابتكار أفكار تصميم جديدة...",
      "🎨 تجهيز التصميم الإبداعي...",
      "📋 تنسيق النتائج النهائية..."
    ];

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast show";
      setTimeout(() => {
        toast.className = "toast";
      }, 2500);
    }

    $("#designForm").submit(function (e) {
      e.preventDefault();
      $("#resultBox").hide();
      $("#loading").show();
      $("#loading-text").text("0%");
      let progress = 0;
      let phraseIndex = 0;

      const loadingInterval = setInterval(() => {
        if (progress < 100) {
          progress += 2;
          $("#loading-text").text(progress + "% " + progressPhrases[phraseIndex]);
          phraseIndex = (phraseIndex + 1) % progressPhrases.length;
        }
      }, 200);

      const formData = {
        prompt: $("textarea[name='prompt']").val(),
        creativity: $("select[name='creativity']").val(),
        mode: $("select[name='mode']").val(),
        model: $("select[name='model']").val(),
        ui_language: $("select[name='ui_language']").val()
      };

      $.ajax({
        url: "/generate",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify(formData),
        success: function (data) {
          clearInterval(loadingInterval);
          $("#loading").hide();
          if (data.result) {
            $("#resultText").text(data.result);
            $("#resultBox").show();
          } else {
            $("#resultText").text("⚠️ لم يتم استلام نتيجة.");
            $("#resultBox").show();
          }
        },
        error: function () {
          clearInterval(loadingInterval);
          $("#loading").hide();
          $("#resultText").text("⚠️ حدث خطأ أثناء الاتصال بالخادم.");
          $("#resultBox").show();
        }
      });
    });

    $("#copyBtn").click(function () {
      navigator.clipboard.writeText($("#resultText").text()).then(() => {
        showToast("✅ تم نسخ النتيجة!");
      });
    });
  </script>
</body>
</html>
