<!DOCTYPE html>
<html dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ translations[lang]['title'] }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- شاشة التحميل -->
<div class="splash-screen" id="splash">
  <div class="logo-loader">
    <div class="pulse-circle"></div>
    <div class="aura-text">Aurasflow</div>
  </div>
</div>

<div class="container" id="main-content" style="display: none;">
  <header>
    <div class="lang-switcher">
      <a href="/set_lang/ar" {% if lang == 'ar' %}class="active"{% endif %}>عربي</a>
      <a href="/set_lang/en" {% if lang == 'en' %}class="active"{% endif %}>English</a>
    </div>
    <h1>{{ translations[lang]['title'] }}</h1>
  </header>

  <div class="main-content">
    <form action="/generate" method="POST">
      <div class="form-group">
        <textarea name="prompt" placeholder="{{ translations[lang]['placeholder'] }}" required>{{ prompt if prompt else '' }}</textarea>
      </div>

      <div class="form-group">
        <label>{{ translations[lang]['creativity_label'] }}</label>
        <div class="radio-options">
          <label><input type="radio" name="creativity" value="low" {% if creativity == 'low' %}checked{% endif %}> {{ translations[lang]['creativity_low'] }}</label>
          <label><input type="radio" name="creativity" value="medium" {% if creativity == 'medium' or not creativity %}checked{% endif %}> {{ translations[lang]['creativity_medium'] }}</label>
          <label><input type="radio" name="creativity" value="high" {% if creativity == 'high' %}checked{% endif %}> {{ translations[lang]['creativity_high'] }}</label>
        </div>
      </div>

      <button type="submit">{{ translations[lang]['button'] | safe }}</button>
    </form>

    {% if result %}
    <div class="result-container">
      <h2 class="result-title">{{ translations[lang]['result_title'] }}</h2>
      <div class="design-result" id="design-result">{{ result }}</div>

      <div class="button-group">
        <button onclick="copyToClipboard()"><i class="fas fa-copy"></i> {{ translations[lang]['copy'] }}</button>
        <button onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> {{ translations[lang]['download'] }}</button>
      </div>
    </div>
    {% endif %}
  </div>

  <footer>
    <p>{{ translations[lang]['footer'] }}</p>
  </footer>
</div>

<!-- Scripts -->
<script>
  // شاشة التحميل
  window.addEventListener("load", () => {
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("main-content").style.display = "block";
    }, 1200);
  });

  function copyToClipboard() {
    const text = document.getElementById("design-result").innerText;
    navigator.clipboard.writeText(text).then(() => {
      alert("{{ 'تم النسخ!' if lang == 'ar' else 'Copied!' }}");
    });
  }

  function downloadPDF() {
    const element = document.getElementById("design-result");
    const opt = {
      margin: 0.5,
      filename: 'Aurasflow_Result.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: {},
      jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().from(element).set(opt).save();
  }
</script>

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

</body>
</html>
